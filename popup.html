<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咪咕防剧透</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 12px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 22px;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 2px; bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #4caf50; }
    input:checked + .slider::before { transform: translateX(18px); }

    .section { margin-bottom: 10px; }
    .section-label { font-size: 11px; color: #888; margin-bottom: 4px; }

    .btn {
      display: inline-block;
      padding: 6px 14px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .btn-download { background: #2196F3; }
    .btn-download:hover:not(:disabled) { background: #1976D2; }
    .btn-cancel { background: #f44336; }
    .btn-cancel:hover:not(:disabled) { background: #d32f2f; }
    .btn-save { background: #4CAF50; }
    .btn-save:hover:not(:disabled) { background: #388E3C; }
    .btn-pause { background: #FF9800; }
    .btn-pause:hover:not(:disabled) { background: #F57C00; }
    .btn-resume { background: #FF9800; }
    .btn-resume:hover:not(:disabled) { background: #F57C00; }
    .btn-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; flex-wrap: wrap; }

    .sniff-box {
      background: #0d1b2a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 11px;
      color: #4fc3f7;
      word-break: break-all;
      margin-top: 4px;
      cursor: pointer;
      overflow: hidden;
    }
    .sniff-box.collapsed {
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .sniff-box.expanded {
      white-space: normal;
      word-break: break-all;
    }
    .btn-sniff { background: #9c27b0; }
    .btn-sniff:hover:not(:disabled) { background: #7b1fa2; }
    .btn-copy-sniff { background: #FF9800; }
    .btn-copy-sniff:hover:not(:disabled) { background: #F57C00; }

    .status-bar {
      font-size: 11px;
      padding: 6px 8px;
      border-radius: 4px;
      background: #16213e;
      min-height: 18px;
      line-height: 1.5;
      word-break: break-all;
      margin-bottom: 6px;
    }
    .status-bar .lbl { color: #888; }
    .status-bar .val { color: #4caf50; font-weight: 600; }
    .status-bar .err { color: #F44336; }
    .status-bar .info { color: #4fc3f7; }

    .dl-progress {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .dl-progress .bar-wrap {
      flex: 1;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }
    .dl-progress .bar-fill {
      height: 100%;
      background: #2196F3;
      width: 0%;
      transition: width 0.3s;
    }
    .dl-progress .pct {
      font-size: 11px;
      color: #888;
      min-width: 32px;
      text-align: right;
    }

    .dl-sub {
      font-size: 11px;
      padding: 2px 0 4px;
      color: #888;
      line-height: 1.4;
    }
    .dl-sub .highlight { color: #4fc3f7; }

    .hint { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.4; }
    .github-link { color: #666; font-size: 10px; text-decoration: none; }
    .github-link:hover { color: #4fc3f7; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">咪咕防剧透 <a class="github-link" href="https://github.com/kalamicode/migu-score-hider" target="_blank">（GitHub项目地址）</a></span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <div class="section-label">嗅探结果（点击展开）</div>
    <div class="sniff-box collapsed" id="sniffBox">等待视频加载...</div>
    <div class="btn-row">
      <button class="btn btn-copy-sniff" id="btnCopySniff" disabled>📋 复制</button>
      <button class="btn btn-sniff" id="btnResniff">🔄 刷新</button>
      <button class="btn btn-download" id="btnDownload">⬇ 下载</button>
    </div>
  </div>

  <div class="section">
    <div class="status-bar" id="statusBar"><span class="lbl">就绪</span></div>
    <div id="dlSection" style="display:none">
      <div class="dl-sub" id="dlSub"></div>
      <div class="dl-progress">
        <div class="bar-wrap"><div class="bar-fill" id="dlBarFill"></div></div>
        <span class="pct" id="dlPct">0%</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-pause" id="btnPause">⏸ 暂停</button>
        <button class="btn btn-save" id="btnSave">💾 保存文件</button>
        <button class="btn btn-cancel" id="btnCancel">✕ 取消</button>
      </div>
    </div>
  </div>

  <div class="hint">⚡ 比分屏蔽开关需要刷新页面生效。<br>💾 下载完成后需手动点击"保存文件"。</div>
  <script src="popup.js"></script>
</body>
</html>
